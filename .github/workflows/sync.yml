name: Job2Calendar Sync

on:
  schedule:
    # Runs at minute 0 past every 12th hour.
    - cron: '0 */12 * * *'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  sync-jobs:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to push the updated files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job2Calendar sync
        run: python main.py

      - name: Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force create the file so Git doesn't crash if the script skipped it
          touch jobs.ics
          
          # Add the database file (in data/) and the calendar feed file (in root)
          git add data/processed_jobs.json jobs.ics || true
          
          # Check if there are any staged changes
          if git diff --staged --quiet; then
            echo "No new jobs processed. Nothing to commit."
          else
            git commit -m "chore: update calendar feed and processed jobs [skip ci]"
            git push
          fi


          